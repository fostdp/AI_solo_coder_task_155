<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 煤层气排水降压模拟</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    
    .offline-container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
    }
    
    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #e94560;
    }
    
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #a0a0a0;
      margin-bottom: 24px;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #e94560, #c73659);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(233, 69, 96, 0.3);
    }
    
    .tips {
      margin-top: 32px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      text-align: left;
    }
    
    .tips h3 {
      font-size: 14px;
      color: #e94560;
      margin-bottom: 12px;
    }
    
    .tips ul {
      list-style: none;
    }
    
    .tips li {
      font-size: 14px;
      color: #888;
      padding: 6px 0;
      padding-left: 24px;
      position: relative;
    }
    
    .tips li::before {
      content: '•';
      position: absolute;
      left: 8px;
      color: #e94560;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>网络连接已断开</h1>
    <p>您当前处于离线状态。部分功能可能无法使用，但已缓存的页面内容仍然可以查看。</p>
    <button class="btn" onclick="window.location.reload()">
      重新连接
    </button>
    
    <div class="tips">
      <h3>离线可用功能</h3>
      <ul>
        <li>查看已缓存的模拟界面</li>
        <li>使用本地计算功能（部分）</li>
        <li>查看已保存的历史数据</li>
      </ul>
    </div>
  </div>
</body>
</html>
